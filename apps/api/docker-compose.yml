services:
  mrww_db:
    container_name: mrww_db
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - mrww_data:/var/lib/postgresql

  prisma_test_db:
    container_name: prisma_test_db
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma
      POSTGRES_DB: tests
    ports:
      - "5433:5432"

volumes:
  mrww_data:
